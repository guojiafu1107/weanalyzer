version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: weanalyzer-postgres
    environment:
      POSTGRES_DB: weanalyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - weanalyzer-net

  redis:
    image: redis:7-alpine
    container_name: weanalyzer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - weanalyzer-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: weanalyzer-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - weanalyzer-net

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: weanalyzer-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - weanalyzer-net

  minio:
    image: minio/minio:latest
    container_name: weanalyzer-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - weanalyzer-net

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: weanalyzer-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - weanalyzer-net

volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:
  clickhouse_data:

networks:
  weanalyzer-net:
    driver: bridge
