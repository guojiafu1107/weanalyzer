# Render Blueprint — 一键部署 WeAnalyzer
# 使用方法：
#   1. 推送到 GitHub
#   2. 在 Render Dashboard 点击 "New Blueprint" → 选择本仓库
#   3. 设置环境变量 ZHIPU_API_KEY（智谱AI密钥）
#   4. 点击 Apply 自动部署

databases:
  - name: weanalyzer-db
    databaseName: weanalyzer
    region: singapore
    plan: free

services:
  # ====== FastAPI 后端 ======
  - type: web
    name: weanalyzer-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend-py/requirements.txt
    startCommand: cd backend-py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weanalyzer-db
          property: connectionString
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_MODEL
        value: glm-4-flash

  # ====== React 前端 ======
  - type: web
    name: weanalyzer-frontend
    runtime: static
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://weanalyzer-backend.onrender.com/api/v1
